# docker-compose.hub.yml
# For deploying on another PC — pulls pre-built images from Docker Hub.
# No source code or model files needed on the target machine.
#
# Usage:
#   1. Copy this file and server/.env to the target machine
#   2. docker compose -f docker-compose.hub.yml pull
#   3. docker compose -f docker-compose.hub.yml up -d

services:
  mongodb:
    image: mongo:6.0
    container_name: malaria-mongo
    volumes:
      - mongodb_data:/data/db
    networks:
      - malaria-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: malaria-redis
    networks:
      - malaria-network
    restart: unless-stopped

  flask-api:
    image: idaya221/malaria-flask-api:latest
    container_name: malaria-flask-api
    ports:
      - "5001:5000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - FLASK_ENV=production
      - UPLOAD_FOLDER=/app/uploads
      - PYTHONUNBUFFERED=1
    networks:
      - malaria-network
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
    restart: unless-stopped

  backend:
    image: idaya221/malaria-backend:latest
    container_name: malaria-backend
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/malaria_lab
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - FLASK_API_URL=http://flask-api:5000
      - FLASK_API_TIMEOUT=600000
      - USE_SHARED_VOLUME=true
      - UPLOAD_DIR=/app/uploads
      - API_BASE_URL=http://localhost:5000
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
      - redis
      - flask-api
    networks:
      - malaria-network
    restart: unless-stopped

  frontend:
    image: idaya221/malaria-frontend:latest
    container_name: malaria-frontend
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - malaria-network
    restart: unless-stopped

volumes:
  mongodb_data:
  uploads_data:

networks:
  malaria-network:
    driver: bridge
